<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VC Radar Chart — Faded Gradient</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#e8eaf0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
font-family:Arial,sans-serif;
}

.card{
background:#f7f8fa;
border-radius:16px;
padding:26px 22px 30px;
width:700px;
}

h2{
text-align:center;
font-size:18px;
color:#1a1a2e;
margin-bottom:4px;
}

.sub{
text-align:center;
font-size:12px;
color:#999;
margin-bottom:18px;
}

.legend{
display:flex;
flex-wrap:wrap;
gap:8px 18px;
justify-content:center;
margin-bottom:18px;
}

.li{
display:flex;
align-items:center;
gap:6px;
font-size:11px;
color:#333;
}

.sw{
width:14px;
height:11px;
border-radius:2px;
border:2px solid;
display:inline-block;
}

.canvas-wrap{
position:relative;
width:100%;
height:500px;
}
</style>
</head>

<body>

<div class="card">

<h2>7 Dimensions Result</h2>
<p class="sub">VC Startup Evaluation · Expected Impact: 7,000 / 10,000</p>

<div class="legend" id="legend"></div>

<div class="canvas-wrap">
<canvas id="radarChart"></canvas>
</div>

</div>

<script>

/* DATA */

const categories = [
'Product Development Roadmap',
'Minimum Viable Product (MVP)',
'Technology Adoption',
'User Experience (UX)',
'Product-Market Fit',
'Revenue Model',
'Sales & Marketing Strategy'
];

const values = [750,700,800,650,600,750,700];


/* COLORS */

const solidColors = [
'#9B2FC8',
'#4040D0',
'#1ABC9C',
'#27AE60',
'#C8A000',
'#E07010',
'#DC1818'
];

const fadedFills = [
'rgba(155,47,200,0.35)',
'rgba(64,64,208,0.35)',
'rgba(26,188,156,0.35)',
'rgba(39,174,96,0.35)',
'rgba(200,160,0,0.35)',
'rgba(224,112,16,0.35)',
'rgba(220,24,24,0.35)'
];

const N = categories.length;


/* LEGEND */

const legendEl = document.getElementById('legend');

categories.forEach((cat,i)=>{

legendEl.innerHTML +=
`
<span class="li">
<span class="sw" style="background:${fadedFills[i]};border-color:${solidColors[i]}"></span>
${cat}
<b style="color:${solidColors[i]}">${values[i]}</b>
</span>
`;

});


/* DATASETS */

const datasets = categories.map((cat,i)=>{

const data = new Array(N).fill(0);
data[i] = values[i];

return{

label:cat,
data:data,
fill:true,

backgroundColor:(context)=>{

const {chart} = context;
const {ctx,chartArea} = chart;

if(!chartArea) return fadedFills[i];

const gradient = ctx.createRadialGradient(
chartArea.width/2,
chartArea.height/2,
40,
chartArea.width/2,
chartArea.height/2,
chartArea.width/2
);

gradient.addColorStop(0,fadedFills[i]);
gradient.addColorStop(1,'rgba(255,255,255,0.05)');

return gradient;

},

borderColor:solidColors[i],
borderWidth:3,

pointBackgroundColor:solidColors[i],
pointBorderColor:'#fff',
pointBorderWidth:1.5,

pointRadius:(ctx)=> ctx.dataIndex===i ? 6 : 0,
pointHoverRadius:(ctx)=> ctx.dataIndex===i ? 8 : 0,

tension:0.2

};

});


/* SCORE LABEL PLUGIN */

const scoreOutsidePlugin = {

id:'scoreOutside',

afterDatasetsDraw(chart){

const {ctx} = chart;
const scale = chart.scales.r;

categories.forEach((cat,i)=>{

const angle = scale.getIndexAngle(i) - Math.PI/2;

const r = scale.getDistanceFromCenterForValue(values[i]) + 28;

const x = scale.xCenter + r*Math.cos(angle);
const y = scale.yCenter + r*Math.sin(angle);

ctx.save();

ctx.font='bold 14px Arial';
ctx.textAlign='center';
ctx.textBaseline='middle';

ctx.strokeStyle='#f7f8fa';
ctx.lineWidth=4;
ctx.strokeText(values[i],x,y);

ctx.fillStyle=solidColors[i];
ctx.fillText(values[i],x,y);

ctx.restore();

});

}

};


/* CHART */

new Chart(document.getElementById('radarChart'),{

type:'radar',

data:{
labels:categories,
datasets:datasets
},

options:{

responsive:true,
maintainAspectRatio:false,

layout:{
padding:{top:26,bottom:26,left:40,right:40}
},

plugins:{

legend:{display:false},

tooltip:{
filter:(item)=> item.raw>0,
callbacks:{
label:(ctx)=> ctx.raw>0 ? `${ctx.dataset.label}: ${ctx.raw}` : null
}
}

},

scales:{

r:{

min:0,
max:1000,

ticks:{
stepSize:200,
color:'#bbb',
font:{size:9},
backdropColor:'transparent'
},

grid:{
color:'rgba(150,150,150,0.4)',
lineWidth:0.8
},

angleLines:{
color:'rgba(150,150,150,0.4)',
lineWidth:0.8
},

pointLabels:{
color:'#1a1a2e',
font:{size:11,weight:'bold'},
padding:12
}

}

}

},

plugins:[scoreOutsidePlugin]

});

</script>

</body>
</html>
