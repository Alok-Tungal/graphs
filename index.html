<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: white;
            margin: 0;
        }
        .chart-container {
            width: 800px;
            height: 800px;
        }
    </style>
</head>
<body>

    <div class="chart-container">
        <canvas id="radarChart"></canvas>
    </div>

    <script>
        // Data Configuration
        const categories = [
            ['Product Development', 'Roadmap'], 
            ['Minimum Viable', 'Product (MVP)'],
            ['Technology', 'Adoption'], 
            ['User Experience', '(UX)'],
            ['Product-Market', 'Fit'], 
            ['Revenue', 'Model'],
            ['Sales & Marketing', 'Strategy']
        ];
        const values = [900, 850, 950, 800, 870, 820, 780];
        const colors = ['#9B59B6', '#2980B9', '#1ABC9C', '#F1C40F', '#E67E22', '#E74C3C', '#FF69B4'];
        
        // Generate separate datasets to replicate the individual filled wedges from Matplotlib
        const datasets = values.map((val, i) => {
            const data = new Array(categories.length).fill(0);
            data[i] = val; // Set only the specific axis value
            
            return {
                label: `${categories[i].join(' ')}  ${val}`,
                data: data,
                backgroundColor: colors[i] + '80', // Hex + 80 = 50% opacity (alpha 0.5)
                borderColor: colors[i],
                borderWidth: 2,
                pointBackgroundColor: colors[i],
                pointBorderColor: '#fff',
                pointRadius: 0, // Hiding default points to match matplotlib purely
                pointHoverRadius: 5
            };
        });

        // Custom plugin to draw the value numbers at the tips of the chart (+70 offset)
        const outerLabelsPlugin = {
            id: 'outerLabels',
            afterDatasetsDraw(chart) {
                const { ctx, scales: { r } } = chart;
                
                chart.data.datasets.forEach((dataset, i) => {
                    const meta = chart.getDatasetMeta(i);
                    const point = meta.data[i]; // The active point for this specific dataset
                    
                    if (point) {
                        ctx.save();
                        ctx.fillStyle = dataset.borderColor;
                        ctx.font = 'bold 12px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        
                        // Calculate offset equivalent to values[i] + 70 in Matplotlib
                        const centerX = r.xCenter;
                        const centerY = r.yCenter;
                        const angle = Math.atan2(point.y - centerY, point.x - centerX);
                        const dist = r.getDistanceFromCenterForValue(values[i] + 70);
                        
                        const x = centerX + Math.cos(angle) * dist;
                        const y = centerY + Math.sin(angle) * dist;

                        ctx.fillText(values[i], x, y);
                        ctx.restore();
                    }
                });
            }
        };

        // Chart Initialization
        const ctx = document.getElementById('radarChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: categories,
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: 40 // Add padding so our custom text labels aren't cut off
                },
                scales: {
                    r: {
                        min: 0,
                        max: 1000,
                        backgroundColor: '#f5f5f5', // Matches ax.set_facecolor
                        ticks: {
                            stepSize: 200,
                            color: 'grey',
                            backdropColor: 'transparent',
                            font: { size: 10 }
                        },
                        grid: {
                            color: 'rgba(128, 128, 128, 0.5)',
                            borderDash: [5, 5]
                        },
                        pointLabels: {
                            color: '#1a1a2e',
                            font: {
                                size: 11,
                                weight: 'bold'
                            }
                        },
                        angleLines: {
                            color: 'rgba(128, 128, 128, 0.5)'
                        }
                    }
                },
                plugins: {
                    title: {
                        display: true,
                        text: ['Anthropic — 7 Dimensions Result', 'Expected Impact: 7,000/10,000'],
                        color: '#1a1a2e',
                        font: { size: 16, weight: 'bold' },
                        padding: { bottom: 30 }
                    },
                    legend: {
                        position: 'right', // Mimics loc='upper right'
                        align: 'start',
                        title: {
                            display: true,
                            text: '7 Dimensions',
                            font: { size: 13, weight: 'bold' }
                        },
                        labels: {
                            color: '#333',
                            font: { size: 11 },
                            usePointStyle: true,
                            boxWidth: 8
                        }
                    }
                }
            },
            plugins: [outerLabelsPlugin] // Register our custom label plugin
        });
    </script>
</body>
</html>
